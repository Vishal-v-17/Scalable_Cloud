<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify Account | Hotel Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <!-- Navbar -->
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand fw-bold" href="{% url 'home' %}">🏨 MyHotel</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="{% url 'home' %}">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'list_room_types' %}">Rooms</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'amenities' %}">Amenities</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'create_room' %}">Add Room</a>
              </li>
              <form class="d-flex align-items-center" method="GET" action="{% url 'room_search' %}">
    
                  <!-- Search Input -->
                  <input
                      class="form-control form-control-sm me-2"
                      type="search"
                      name="keyword"
                      placeholder="Search description..."
                      aria-label="Search"
                      value="{{ request.GET.keyword }}"
                  >
              
                  <!-- Dropdown Button -->
                  <div class="dropdown me-2">
                      <button class="btn btn-outline-secondary btn-sm dropdown-toggle" 
                              type="button" 
                              data-bs-toggle="dropdown" 
                              aria-expanded="false">
                          Filters
                      </button>
              
                      <!-- DROPDOWN MENU -->
                      <div class="dropdown-menu p-3 shadow" style="min-width: 250px;">
              
                          <!-- Occupancy -->
                          <label class="form-label fw-bold mb-1">Occupancy</label>
                          <select class="form-select form-select-sm mb-3" name="occupancy">
                              <option value="">Any Occupancy</option>
                              <option value="Single">Single</option>
                              <option value="Double">Double</option>
                              <option value="Triple">Triple</option>
                              <option value="Quad">Quad</option>
                          </select>
              
                          <!-- Bed Size -->
                          <label class="form-label fw-bold mb-1">Bed Size</label>
                          <select class="form-select form-select-sm mb-3" name="bed_size">
                              <option value="">Any Bed Size</option>
                              <option value="King">King</option>
                              <option value="Queen">Queen</option>
                              <option value="Twin">Twin</option>
                          </select>
              
                          <!-- Layout -->
                          <label class="form-label fw-bold mb-1">Layout</label>
                          <select class="form-select form-select-sm mb-3" name="layout">
                              <option value="">Any Layout</option>
                              <option value="Standard">Standard</option>
                              <option value="Deluxe">Deluxe</option>
                              <option value="Suite">Suite</option>
                          </select>
              
                          <!-- Wifi -->
                          <label class="form-label fw-bold mb-1">Wifi</label>
                          <select class="form-select form-select-sm mb-3" name="wifi">
                              <option value="">Any</option>
                              <option value="true">Available</option>
                              <option value="false">Not Available</option>
                          </select>
              
                          <!-- Min / Max Price -->
                          <div class="row">
                              <div class="col">
                                  <label class="form-label fw-bold mb-1">Min Price</label>
                                  <input type="number" name="min_price" 
                                         class="form-control form-control-sm mb-3"
                                         placeholder="0">
                              </div>
              
                              <div class="col">
                                  <label class="form-label fw-bold mb-1">Max Price</label>
                                  <input type="number" name="max_price" 
                                         class="form-control form-control-sm mb-3"
                                         placeholder="500">
                              </div>
                          </div>
                      </div>
                  </div>
              
                  <!-- Submit -->
                  <button class="btn btn-primary btn-sm" type="submit">Search</button>
              </form>
            </ul>
            <nav class="navbar">
              {% if email %}
                <li class="nav-item me-3 text-light d-flex align-items-center">
                  Hello, <strong class="ms-1">{{ email }}</strong>
                </li>
                <li class="nav-item"><a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a></li>
              {% else %}
                <li class="nav-item me-2"><a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a></li>
              {% endif %}
              </nav>
          </div>
        </div>
      </nav>

<div class="container mt-5">
  <h2 class="text-center mb-4">Verify Your Email</h2>

  <div class="card mx-auto" style="max-width: 400px;">
    <div class="card-body">

      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label>Signup Verification Code</label>
          <input type="text" name="code" class="form-control" required>
        </div>

        <button class="btn btn-dark w-100" type="submit">Verify</button>
      </form>
      <div class="alert alert-info text-center" role="alert">
        Please check your email and <strong>confirm the SNS subscription</strong> 
        to receive important notifications.
      </div>
    </div>
  </div>
</div>
</body>
</html>
