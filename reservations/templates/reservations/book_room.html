{% comment %} <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Room | Hotel Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
  <h2 class="text-center mb-4">Confirm Your Booking</h2>
  <div class="card mx-auto" style="max-width: 500px;">
    <div class="card-body text-center">
      <h4>Room {{ room.room_no }}</h4>
      <p>Type: {{ room.room_type_id.type }}</p>
      <p>Price: ${{ room.price }}</p>
      <form method="POST">
        {% csrf_token %}
        <button class="btn btn-success w-100" type="submit">Book This Room</button>
      </form>
    </div>
  </div>
</div>
</body>
</html> {% endcomment %}
