{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
  <title>Add Room Type</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
    <title>Book Room</title>
    <style>
        .container {
            font-family: Arial, sans-serif; 
            max-width: 450px;
            margin: auto;
            padding: 25px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .container label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        .container input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }
        .container button {
            margin-top: 25px;
            padding: 12px 20px;
            background: #28a745;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        .container button:hover {
            background: #218838;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand fw-bold" href="{% url 'home' %}">🏨 MyHotel</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="{% url 'home' %}">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'list_room_types' %}">Rooms</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'amenities' %}">Amenities</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'create_room' %}">Add Room</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'map' %}">Map</a>
              </li>
              <form class="d-flex align-items-center" method="GET" action="{% url 'room_search' %}">
    
                  <!-- Search Input -->
                  <input
                      class="form-control form-control-sm me-2"
                      type="search"
                      name="keyword"
                      placeholder="Search description..."
                      aria-label="Search"
                      value="{{ request.GET.keyword }}"
                  >
              
                  <!-- Dropdown Button -->
                  <div class="dropdown me-2">
                      <button class="btn btn-outline-secondary btn-sm dropdown-toggle" 
                              type="button" 
                              data-bs-toggle="dropdown" 
                              aria-expanded="false">
                          Filters
                      </button>
              
                      <!-- DROPDOWN MENU -->
                      <div class="dropdown-menu p-3 shadow" style="min-width: 250px;">
              
                          <!-- Occupancy -->
                          <label class="form-label fw-bold mb-1">Occupancy</label>
                          <select class="form-select form-select-sm mb-3" name="occupancy">
                              <option value="">Any Occupancy</option>
                              <option value="Single">Single</option>
                              <option value="Double">Double</option>
                              <option value="Triple">Triple</option>
                              <option value="Quad">Quad</option>
                          </select>
              
                          <!-- Bed Size -->
                          <label class="form-label fw-bold mb-1">Bed Size</label>
                          <select class="form-select form-select-sm mb-3" name="bed_size">
                              <option value="">Any Bed Size</option>
                              <option value="King">King</option>
                              <option value="Queen">Queen</option>
                              <option value="Twin">Twin</option>
                          </select>
              
                          <!-- Layout -->
                          <label class="form-label fw-bold mb-1">Layout</label>
                          <select class="form-select form-select-sm mb-3" name="layout">
                              <option value="">Any Layout</option>
                              <option value="Standard">Standard</option>
                              <option value="Deluxe">Deluxe</option>
                              <option value="Suite">Suite</option>
                          </select>
              
                          <!-- Wifi -->
                          <label class="form-label fw-bold mb-1">Wifi</label>
                          <select class="form-select form-select-sm mb-3" name="wifi">
                              <option value="">Any</option>
                              <option value="true">Available</option>
                              <option value="false">Not Available</option>
                          </select>
              
                          <!-- Min / Max Price -->
                          <div class="row">
                              <div class="col">
                                  <label class="form-label fw-bold mb-1">Min Price</label>
                                  <input type="number" name="min_price" 
                                         class="form-control form-control-sm mb-3"
                                         placeholder="0">
                              </div>
              
                              <div class="col">
                                  <label class="form-label fw-bold mb-1">Max Price</label>
                                  <input type="number" name="max_price" 
                                         class="form-control form-control-sm mb-3"
                                         placeholder="500">
                              </div>
                          </div>
              
                          <!-- Rating -->
                          <label class="form-label fw-bold mb-1">Rating</label>
                          <select name="rating" class="form-select form-select-sm">
                              <option value="">Any Rating</option>
                              <option value="1">1+</option>
                              <option value="2">2+</option>
                              <option value="3">3+</option>
                              <option value="4">4+</option>
                              <option value="5">5</option>
                          </select>
              
                      </div>
                  </div>
              
                  <!-- Submit -->
                  <button class="btn btn-primary btn-sm" type="submit">Search</button>
              </form>
            </ul>
            <nav class="navbar">
              {% if email %}
                <li class="nav-item me-3 text-light d-flex align-items-center">
                  Hello, <strong class="ms-1">{{ email }}</strong>
                </li>
                <li class="nav-item"><a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a></li>
              {% else %}
                <li class="nav-item me-2"><a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a></li>
              {% endif %}
              </nav>
          </div>
        </div>
      </nav>
    <div class="container">
        <h2>Book Room</h2>
        <p>Select your stay duration</p>

        <form method="POST">
            {% csrf_token %}

            <label>Start Date</label>
            <input type="date" name="start_date" required>

            <label>End Date</label>
            <input type="date" name="end_date" required>
            
            <!-- Offer hint shown dynamically based on month picked -->
        <div id="offer-hint" class="alert alert-info mt-2" style="display:none;">
            🏷️ <span id="offer-text"></span>
        </div>

            <button type="submit">Calculate Price & Continue</button>
        </form>
    </div>

</body>
<script>
const offers = {{ offers_json|safe }};  {# passed from view #}

document.getElementById("start_date").addEventListener("change", function () {
    const month = new Date(this.value).getMonth() + 1;
    const seasonMap = {
        1:  ["New Year", "Pongal"],
        2:  ["Valentine's Day"],
        3:  ["Women's Day", "Easter"],
        4:  ["Easter", "Summer Sale"],
        5:  ["Summer Sale"],
        6:  ["Summer Sale"],
        10: ["Halloween", "Diwali"],
        11: ["Diwali", "Black Friday"],
        12: ["Cyber Monday", "Christmas"],
    };
    const candidates = seasonMap[month] || [];
    let bestOffer = null, bestDiscount = 0;
    candidates.forEach(name => {
        if (offers[name] && offers[name] > bestDiscount) {
            bestDiscount = offers[name];
            bestOffer = name;
        }
    });

    const hint = document.getElementById("offer-hint");
    if (bestOffer) {
        document.getElementById("offer-text").textContent =
            `${bestOffer} offer available — ${(bestDiscount * 100).toFixed(0)}% off your booking!`;
        hint.style.display = "block";
    } else {
        hint.style.display = "none";
    }
});
</script>
</html>
