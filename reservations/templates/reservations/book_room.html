<!DOCTYPE html>
<html>
<head>
    <title>Book Room</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 30px; 
        }
        .container {
            max-width: 450px;
            margin: auto;
            padding: 25px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }
        button {
            margin-top: 25px;
            padding: 12px 20px;
            background: #28a745;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background: #218838;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Book Room</h2>
        <p>Select your stay duration</p>

        <form method="POST">
            {% csrf_token %}

            <label>Start Date</label>
            <input type="date" name="start_date" required>

            <label>End Date</label>
            <input type="date" name="end_date" required>

            <button type="submit">Calculate Price & Continue</button>
        </form>
    </div>
</body>
</html>
